<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hobbies | Sketches</title>
    <link rel="stylesheet" href="style.css">
   <style>
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        padding: 40px;
        /* This creates the 3D space for the flip */
        perspective: 1000px; 
    }

    .gallery-item {
        position: relative;
        width: 100%;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        
        /* Smooth timing for the effect */
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                    box-shadow 0.6s ease;
        
        /* Sets the pivot point to the top so it "flaps" downward */
        transform-origin: top; 
        cursor: pointer;
    }

    /* The "Flap and Go Down" Effect */
    .gallery-item:hover {
        /* rotateX tilts it down, translateY moves it slightly lower */
        transform: rotateX(-25deg) translateY(15px); 
        box-shadow: 0 25px 50px rgba(56, 189, 248, 0.4);
        z-index: 10;
    }

    .gallery-img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        transition: filter 0.6s ease;
    }

    .gallery-item:hover .gallery-img {
        filter: brightness(1.1);
    }
</style>

<div class="gallery">
   <div class="gallery-item">
        <img src="drawing1.jpg.jpg" class="gallery-img">
    </div>
    <div class="gallery-item">
        <img src="drawing2.jpg.jpg" class="gallery-img">
    </div>
    <div class="gallery-item">
        <img src="drawing3.jpg.jpg" class="gallery-img">
    </div>
    <div class="gallery-item">
        <img src="drawing4.jpg.jpg" class="gallery-img">
    </div>
    <div class="gallery-item">
        <img src="niki.jpg" class="gallery-img">
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uplink | Vasantha</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #00081a;
            --royal-gold: #ffd700;
            --royal-silver: #e2e8f0;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            cursor: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #binary-void { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        
        #custom-pointer {
            width: 12px; height: 12px; background: var(--royal-silver);
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 10000; box-shadow: 0 0 15px #fff; transform: translate(-50%, -50%);
        }

        .contact-card {
            background: rgba(1, 22, 56, 0.9);
            border: 2px solid var(--neon-purple);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.2);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        .profile-img {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--royal-gold);
            margin-bottom: 15px; object-fit: cover;
        }

        h1 { color: var(--royal-gold); font-family: 'Fira Code', monospace; font-size: 1.8rem; margin: 0; }
        .status { color: var(--neon-blue); font-size: 0.7rem; letter-spacing: 3px; margin: 10px 0 30px 0; }

        .contact-link {
            display: block;
            color: var(--royal-silver);
            text-decoration: none;
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            margin: 10px 0;
            padding: 15px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 10px;
            transition: 0.3s;
        }

        .contact-link:hover {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .back-btn {
            margin-top: 30px;
            display: inline-block;
            color: var(--royal-gold);
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .back-btn:hover { opacity: 1; }
    </style>
</head>
<body>

    <canvas id="binary-void"></canvas>
    <div id="custom-pointer"></div>

    <div class="contact-card">
        <img src="master..jpeg" alt="Vasantha" class="profile-img">
        <h1>TERMINAL_UPLINK</h1>
        <div class="status">> CONNECTION_STABLE</div>

        <a href="mailto:vasanthakumar@gmail.com" class="contact-link">
            [ EMAIL_CLIENT ]
        </a>

        <a href="https://wa.me/916280844791" target="_blank" class="contact-link">
            [ PHONE_LINE: +91 62808... ]
        </a>

        <a href="#" class="contact-link">
            [ LINKEDIN_CORE ]
        </a>

        <a href="index.html" class="back-btn">< EXIT_SESSION ></a>
    </div>

    <script>
        // BINARY VOID
        const canvas = document.getElementById('binary-void');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 8, 26, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#bc13fe";
            ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.random() > 0.5 ? "1" : "0", i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 40);

        // POINTER
        document.addEventListener('mousemove', (e) => {
            const p = document.getElementById('custom-pointer');
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>

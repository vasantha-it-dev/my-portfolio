<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vasantha Kumar | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head> 
<style>
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        padding: 40px;
        /* This creates the 3D space for the flip */
        perspective: 1000px; 
    }

    .gallery-item {
        position: relative;
        width: 100%;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        
        /* Smooth timing for the effect */
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                    box-shadow 0.6s ease;
        
        /* Sets the pivot point to the top so it "flaps" downward */
        transform-origin: top; 
        cursor: pointer;
    }

    /* The "Flap and Go Down" Effect */
    .gallery-item:hover {
        /* rotateX tilts it down, translateY moves it slightly lower */
        transform: rotateX(-25deg) translateY(15px); 
        box-shadow: 0 25px 50px rgba(56, 189, 248, 0.4);
        z-index: 10;
    }

    .gallery-img {
        width: 15%;
        height: 15%;
        display: block;
        object-fit: cover;
        transition: filter 0.6s ease;
    }

    .gallery-item:hover .gallery-img {
        filter: brightness(1.1);
    }
</style>
<body>
    <audio id="victory-sound" src="victory.mp3"></audio>

    
<div class="gallery">
   <div class="gallery-item" id="title card">
                <img src="profile.jpg" alt="Vasantha Kumar" class="gallery-item" style="width:100%;" height="100%">
            </div>
            <div> <h1>Information Technology Student </h1>
            <h1>Vasantha Kumar</h1>
            <p >19-year-old developer specializing in Python and UI/UX Design.</p></div>
            
            <div class="main-actions">
             <div class="button-wrapper" style="height: 100px; display: flex; align-items: center; justify-content: center;">
    <a href="master.html" id="learn-btn" class="btn-primary" style="position: fixed; z-index: 9999; transition: all 0.2s ease;">
    Learn About Me
</a>
</div>
    <div class="nav-menu">
    <a href="contact.html" class="nav-item">Contact</a>
    <a href="study.html" class="nav-item">Study</a>
    <a href="hobby.html" class="nav-item">Hobby</a>
</div>
    <script src="script.js"></script>
                <script>
    const learnBtn = document.getElementById('learn-btn');
    const navMenu = document.querySelector('.nav-menu');
    const victorySound = document.getElementById('victory-sound');
    let moveCount = 0;
    const maxMoves = 5;

    learnBtn.addEventListener('mouseover', () => {
        if (moveCount < maxMoves) {
            // Move the button randomly
            const maxX = window.innerWidth - learnBtn.offsetWidth - 100;
            const maxY = window.innerHeight - learnBtn.offsetHeight - 100;
            learnBtn.style.left = Math.random() * maxX + 'px';
            learnBtn.style.top = Math.random() * maxY + 'px';
            
            moveCount++;
            learnBtn.innerText = "Catch me! 🏃‍♂️";
        } else {
            learnBtn.innerText = "Claim Your Reward! 👑";
            learnBtn.style.background = "linear-gradient(45deg, #ffd700, #b8860b)";
            learnBtn.style.boxShadow = "0 0 40px #ffd700";
        }
    });

    learnBtn.addEventListener('click', (e) => {
        if (moveCount >= maxMoves) {
            e.preventDefault();
            
            // 1. Play Sound
            victorySound.play();

            // 2. Fire Confetti
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ffd700', '#ffffff', '#38bdf8']
            });

            // 3. Hide the game button
            learnBtn.style.display = 'none';

            // 4. Reveal Royal Menu
            navMenu.classList.add('reveal-active');
        }
    });
</script>
</body>
</html>

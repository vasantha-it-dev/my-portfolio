<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vasantha Kumar | Mad Architect Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #00081a;
            --card: #011638;
            --text: #f8fafc;
            --royal-gold: #ffd700;
            --royal-silver: #e2e8f0;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe; /* Your Mad Idea! */
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            cursor: none; 
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- THE BINARY VOID CANVAS --- */
        #binary-void {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: var(--bg);
        }

        /* --- SILVER POINTER --- */
        #custom-pointer {
            width: 12px;
            height: 12px;
            background: var(--royal-silver);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            box-shadow: 0 0 15px #fff, 0 0 30px var(--royal-silver);
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
        }

        /* --- PROFILE PHOTO: 3D TILT & ENTRANCE --- */
        .image-wrapper {
            perspective: 1200px;
            margin-bottom: 20px;
            position: relative;
        }

        .profile-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 4px solid var(--royal-gold);
            box-shadow: 0 0 30px var(--royal-gold), 0 0 50px var(--neon-purple);
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            object-fit: cover;
            animation: coinFlipEntry 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes coinFlipEntry {
            0% { transform: rotateY(-360deg) scale(0); opacity: 0; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        .photo-flip-exit {
            animation: coinFlipExit 0.8s forwards !important;
        }

        @keyframes coinFlipExit {
            0% { transform: rotateY(0deg) scale(1); }
            100% { transform: rotateY(360deg) scale(0); opacity: 0; }
        }

        /* --- TYPOGRAPHY & GLITCH --- */
        h1 {
            font-weight: 900;
            font-size: 3rem;
            margin: 10px 0;
            color: var(--royal-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .terminal-container {
            font-family: 'Fira Code', monospace;
            color: var(--neon-blue);
            font-size: 1.4rem;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--neon-purple);
        }

        /* --- THE RUNAWAY BUTTON --- */
        #learn-btn {
            background: linear-gradient(45deg, var(--royal-gold), var(--neon-purple));
            color: #000;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            border: 2px solid #fff;
            box-shadow: 0 0 20px var(--neon-purple);
            transition: transform 0.2s, box-shadow 0.3s;
            z-index: 100;
        }

        /* --- THE HIDDEN NAV --- */
        .nav-menu {
            display: none;
            gap: 20px;
            margin-top: 40px;
        }

        .nav-item {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 25px;
            border: 2px solid var(--neon-blue);
            border-radius: 50px;
            background: rgba(0, 243, 255, 0.1);
            transition: 0.3s;
        }

        .nav-item:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .reveal-active { display: flex !important; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <canvas id="binary-void"></canvas>

    <div id="custom-pointer"></div>

    <div class="image-wrapper">
        <img src="master..jpeg" alt="Vasantha Kumar" class="profile-img">
    </div>

    <h1>VASANTHA KUMAR</h1>

    <div class="terminal-container">
        <span style="color:var(--royal-gold)">$</span> <span id="typewriter"></span><span style="animation: blink 1s infinite">_</span>
    </div>

    <div style="height: 100px;">
        <a href="#" id="learn-btn">INITIATE SYSTEM</a>
    </div>

    <div class="nav-menu">
        <a href="study.html" class="nav-item">STUDIES</a>
        <a href="hobby.html" class="nav-item">HOBBIES</a>
        <a href="contact.html" class="nav-item">CONTACT</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('binary-void');
            const ctx = canvas.getContext('2d');
            const pointer = document.getElementById('custom-pointer');
            const profile = document.querySelector('.profile-img');
            const learnBtn = document.getElementById('learn-btn');
            const navMenu = document.querySelector('.nav-menu');
            const typewriter = document.getElementById('typewriter');

            // --- 1. BINARY VOID (Neon Purple Rain) ---
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function drawBinary() {
                ctx.fillStyle = "rgba(0, 8, 26, 0.15)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#bc13fe"; // NEON PURPLE
                ctx.font = fontSize + "px monospace";
                for(let i=0; i<drops.length; i++) {
                    const text = Math.random() > 0.5 ? "1" : "0";
                    ctx.fillText(text, i*fontSize, drops[i]*fontSize);
                    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(drawBinary, 40);

            // --- 2. MOUSE & 3D TILT ---
            document.addEventListener('mousemove', (e) => {
                pointer.style.left = e.clientX + 'px';
                pointer.style.top = e.clientY + 'px';
                
                // Tilt logic
                const xAxis = (window.innerWidth / 2 - e.pageX) / 15;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 15;
                profile.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            // --- 3. TYPEWRITER ---
            const phrases = ["Python Specialist", "UI/UX Visionary", "Mad Scientist", "Cloud Architect Student"];
            let pIdx = 0, cIdx = 0, isDeleting = false;

            function typeEffect() {
                const current = phrases[pIdx];
                typewriter.textContent = current.substring(0, cIdx);
                if (!isDeleting && cIdx < current.length) { cIdx++; setTimeout(typeEffect, 100); }
                else if (isDeleting && cIdx > 0) { cIdx--; setTimeout(typeEffect, 50); }
                else {
                    isDeleting = !isDeleting;
                    if(!isDeleting) pIdx = (pIdx + 1) % phrases.length;
                    setTimeout(typeEffect, isDeleting ? 2000 : 500);
                }
            }
            typeEffect();

            // --- 4. THE RUNAWAY GAME ---
            let moves = 0;
            learnBtn.addEventListener('mouseover', () => {
                if(moves < 5) {
                    learnBtn.style.position = 'fixed';
                    learnBtn.style.left = Math.random() * (window.innerWidth - 200) + 'px';
                    learnBtn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
                    moves++;
                    learnBtn.innerText = "ACCESS DENIED";
                } else {
                    learnBtn.innerText = "ACCESS GRANTED 👑";
                    learnBtn.style.background = "var(--neon-blue)";
                }
            });

            learnBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if(moves >= 5) {
                    learnBtn.style.display = 'none';
                    navMenu.classList.add('reveal-active');
                    confetti({ particleCount: 200, spread: 100, colors: ['#ffd700', '#bc13fe', '#00f3ff'] });
                }
            });
        });
    </script>
</body>
</html>
